<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PassMan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🔐 Local Password Manager</h1>

  <div class="section">
    <h2>1. Key Management</h2>
    <div class="button-group">
        <button id="generateKeyBtn">Generate New Key</button>
        <input type="file" id="keyFileUpload" accept=".key" style="display:none" />
        <button onclick="document.getElementById('keyFileUpload').click()">Upload .key File</button>
    </div>
    <p id="keyStatus">No key loaded.</p>
  </div>

  <div class="section">
    <h2>2. Password Vault</h2>
    <div class="button-group">
        <label class="custom-file-upload">
            <input type="file" id="csvFileInput" accept=".txt,.csv" />
            Upload/Decrypt File
        </label>
        <button id="addNewBtn">Create New Entry</button>
    </div>

    <div id="tableContainer" class="decrypted-container">
        <table id="passwordTable">
            <thead>
                <tr>
                    <th>Website/Service</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div class="button-group" style="margin-top: 20px;">
        <button id="downloadEncryptedBtn">Encrypt & Download Vault</button>
        <button id="downloadCSVBtn" class="secondary">Download Plaintext CSV</button>
    </div>
  </div>

  <script src="PassMan.js"></script>
</body>
</html>
