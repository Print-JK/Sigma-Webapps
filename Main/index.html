<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigma Webapps</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      line-height: 1.6;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #bbb;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("asset/Home.gif") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content h1 {
      font-size: 72px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero-content p {
      font-size: 20px;
      color: #ddd;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border: 2px solid white;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* SHOWCASE */
    .section {
      padding: 100px 60px;
      background: #181818;
    }

    .section-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

.card-link {
  text-decoration: none;
  color: inherit;
  display: block;
}

    .card {
      background: #222;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-content {
      padding: 20px;
    }

    .card-content h3 {
      margin-bottom: 10px;
    }

    .card-content p {
      color: #bbb;
    }

    /* CTA */
    .cta {
      padding: 80px 20px;
      text-align: center;
      background: #0d0d0d;
    }

    .cta h2 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .cta p {
      color: #bbb;
      margin-bottom: 30px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      background: black;
      color: #777;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .navbar {
        padding: 20px;
        flex-direction: column;
        gap: 15px;
      }

      .hero-content h1 {
        font-size: 42px;
      }

      .hero-content p {
        font-size: 16px;
      }

      .section {
        padding: 80px 20px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Where All Your Utilities Reside</div>

    <!---Don't need this anymore
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  
    -->

    </nav>
  
    <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h2>Welcome To</h2>
      <h1>Sigma Webapps</h1>
    </div>
  </section>

  <!-- SHOWCASE -->
  <section class="section">
    <h2 class="section-title">Tools</h2>

    <div class="grid">

	<a href="../PassMan/Index.html" class="card-link"> 
      <div class="card">
        <img src="asset/passman.jpg" alt="">
        <div class="card-content">
          <h3>PassMan</h3>
          <p>Password Manager.</p>
        </div>
      </div>
	</a>

	<a href="../ZIPencrypt/index.html" class="card-link">
      <div class="card">
        <img src="asset/LocalPreview.jpg" alt="">
        <div class="card-content">
          <h3>Local Preview</h3>
          <p>Preview Files and allows Encryption.</p>
        </div>
      </div>
	</a>

	<a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1" target="_blank" class="card-link"> 
     <div class="card">
        <img src="asset/wip.jpg" alt="">
        <div class="card-content">
          <h3>nothing yet...</h3>
          <p>Maybe one day.</p>
        </div>
      </div>
	</a>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 By JK
  </footer>

</body>
</html>
